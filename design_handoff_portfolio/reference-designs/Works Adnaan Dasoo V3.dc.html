<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  componentDidMount() {
    this._cleanups = [];
    const doc = document;
    const q = (s) => doc.querySelector(s);
    const qa = (s) => Array.from(doc.querySelectorAll(s));

    // ---------- v3 nav: highlight hover + say-hi swap ----------
    qa('[data-navlink]').forEach((el) => {
      const hl = el.querySelector('[data-nl-hl]');
      if (!hl) return;
      const enter = () => { hl.style.transformOrigin = 'left center'; hl.style.transform = 'scaleX(1)'; };
      const leave = () => { hl.style.transformOrigin = 'right center'; hl.style.transform = 'scaleX(0)'; };
      el.addEventListener('mouseenter', enter);
      el.addEventListener('mouseleave', leave);
      this._cleanups.push(() => { el.removeEventListener('mouseenter', enter); el.removeEventListener('mouseleave', leave); });
    });
    const sayhi = q('[data-sayhi]');
    if (sayhi) {
      const shBase = sayhi.querySelector('[data-sh-base]');
      const shOver = sayhi.querySelector('[data-sh-over]');
      const shA1 = sayhi.querySelector('[data-sh-a1]');
      const shA2 = sayhi.querySelector('[data-sh-a2]');
      const enter = () => { shBase.style.transform = 'translateY(-105%)'; shOver.style.transform = 'translateY(0)'; shA1.style.transform = 'translate(130%, -130%)'; shA2.style.transform = 'translate(0, 0)'; };
      const leave = () => { shBase.style.transform = 'translateY(0)'; shOver.style.transform = 'translateY(105%)'; shA1.style.transform = 'translate(0, 0)'; shA2.style.transform = 'translate(-130%, 130%)'; };
      sayhi.addEventListener('mouseenter', enter);
      sayhi.addEventListener('mouseleave', leave);
      this._cleanups.push(() => { sayhi.removeEventListener('mouseenter', enter); sayhi.removeEventListener('mouseleave', leave); });
    }
    const fine = window.matchMedia('(pointer: fine)').matches;

    // ---------- marquee: WORKS / ワークス, en-dash separators, all off-white ----------
    qa('[data-marquee-group]').forEach((group) => {
      const frag = doc.createDocumentFragment();
      const dash = () => { const d = doc.createElement('span'); d.textContent = '\u2013'; d.style.cssText = "flex: none; margin: 0 26px; font: 500 13px/1 'Manrope', sans-serif; color: rgba(236,235,232,0.82);"; return d; };
      for (let i = 0; i < 8; i++) {
        const en = doc.createElement('span');
        en.textContent = 'WORKS';
        en.style.cssText = "font: 500 13px/1 'Manrope', sans-serif; letter-spacing: 0.06em; color: rgba(236,235,232,0.82); white-space: nowrap;";
        frag.appendChild(en); frag.appendChild(dash());
        const jp = doc.createElement('span');
        jp.lang = 'ja';
        jp.textContent = '\u30ef\u30fc\u30af\u30b9';
        jp.style.cssText = "font: 700 13px/1 'Manrope','Hiragino Kaku Gothic ProN','Yu Gothic','Noto Sans JP',sans-serif; letter-spacing: 0.08em; color: rgba(236,235,232,0.82); white-space: nowrap;";
        frag.appendChild(jp); frag.appendChild(dash());
      }
      group.appendChild(frag);
    });

    // ---------- nav hovers -> lilac (links AND toggles) ----------
    if (fine) qa('[data-ablink]').forEach((el) => {
      if (el.hasAttribute('data-current')) return;
      const enter = () => { el.style.color = '#c7c2ce'; };
      const leave = () => { el.style.color = '#8a8a8e'; };
      el.addEventListener('mouseenter', enter);
      el.addEventListener('mouseleave', leave);
      this._cleanups.push(() => { el.removeEventListener('mouseenter', enter); el.removeEventListener('mouseleave', leave); });
    });

    // ---------- dark / monochrome toggles applied to the works section ----------
    this._ab = { dark: false, mono: false };
    try { const s = JSON.parse(localStorage.getItem('site-fx') || '{}'); this._ab.dark = !!s.dark; this._ab.mono = !!s.mono; } catch (e) {}
    const narr = q('[data-ab-narr]');
    const applyAb = () => {
      const f = [];
      if (this._ab.dark) f.push('invert(1)');
      if (this._ab.mono) f.push('grayscale(1)');
      if (narr) { narr.style.filter = f.join(' '); narr.style.background = this._ab.dark ? '#eeedeb' : '#ffffff'; }
      if (this._paintHead) this._paintHead();   // #eeedeb inverts to #111214 (home off-black); light stays pure white
      qa('[data-pixtrail]').forEach(wp => { wp.style.filter = this._ab.dark ? 'invert(1)' : ''; });   // counter-invert shot wraps (img + trail canvas) so they stay true
    };
    qa('[data-abtoggle]').forEach((btn) => {
      const kind = btn.getAttribute('data-abtoggle');
      const ind = btn.querySelector('[data-ab-ind]');
      if (ind) ind.textContent = this._ab[kind] ? 'y' : 'n';
      const fn = () => { this._ab[kind] = !this._ab[kind]; if (ind) ind.textContent = this._ab[kind] ? 'y' : 'n'; try { localStorage.setItem('site-fx', JSON.stringify(this._ab)); } catch (e) {} applyAb(); };
      btn.addEventListener('click', fn);
      this._cleanups.push(() => btn.removeEventListener('click', fn));
    });
    applyAb();   // apply any persisted theme instantly on load...
    requestAnimationFrame(() => requestAnimationFrame(() => {   // ...then arm the soft cross-fade for user toggles
      if (narr) narr.style.transition = 'filter 0.55s ease';
      qa('[data-pixtrail]').forEach(wp => { wp.style.transition = 'filter 0.55s ease'; });
    }));

    // ---------- grid hero: lilac grid morph; verticals break only where they cross nav text ----------
    const sec = q('[data-grid-sec]');
    const cv = q('[data-grid-canvas]');
    const breaks = qa('[data-gridbreak]');
    const MARQ = 24;
    let gridUpdate = null;
    if (sec && cv) {
      const ctx = cv.getContext('2d');
      const LILAC = '199,194,206';
      const STEP = 12, AMP = 130, SX = 120, SY = 280;
      let W = 0, H = 0, dpr = 1, lines = [];
      const build = () => {
        dpr = Math.min(2, window.devicePixelRatio || 1);
        W = sec.clientWidth; H = sec.clientHeight;
        cv.width = Math.round(W * dpr); cv.height = Math.round(H * dpr);
        lines = [];
        const nCols = Math.max(6, Math.round(W / 178));
        const gap = W / nCols;
        for (let c = 1; c < nCols; c++) {
          const xs = (c % 2 === 0) ? [c * gap] : [c * gap - 6, c * gap + 6];
          xs.forEach((x) => {
            const pts = [];
            for (let y = 0; y <= H + STEP; y += STEP) pts.push({ y, o: 0, v: 0 });
            lines.push({ x, pts });
          });
        }
      };
      build();
      let mx = null, my = 0;
      const move = (e) => { const r = cv.getBoundingClientRect(); mx = e.clientX - r.left; my = e.clientY - r.top; };
      const out = () => { mx = null; };
      sec.addEventListener('mousemove', move);
      sec.addEventListener('mouseleave', out);
      window.addEventListener('resize', build);
      this._cleanups.push(() => { sec.removeEventListener('mousemove', move); sec.removeEventListener('mouseleave', out); window.removeEventListener('resize', build); });
      gridUpdate = () => {
        const cr = cv.getBoundingClientRect();
        const rects = breaks.map((el) => { const r = el.getBoundingClientRect(); return { x0: r.left - cr.left - 9, x1: r.right - cr.left + 9, y0: r.top - cr.top - 5, y1: r.bottom - cr.top + 5 }; });
        const gb = H - MARQ;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.clearRect(0, 0, W, H);
        ctx.lineWidth = 1;
        ctx.strokeStyle = 'rgba(' + LILAC + ',0.12)';
        [0.62].forEach((f) => { const y = Math.round(gb * f) + 0.5; ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); });
        ctx.strokeStyle = 'rgba(' + LILAC + ',0.26)';
        for (const ln of lines) {
          const dir = ln.x < W / 2 ? -1 : 1;
          const edge = Math.min(1, Math.abs(ln.x - W / 2) / (W / 2));
          for (const p of ln.pts) {
            let t = 0;
            if (mx != null) {
              const dx = ln.x - mx, dy = p.y - my;
              const g = Math.exp(-(dx * dx) / (2 * SX * SX) - (dy * dy) / (2 * SY * SY));
              t = dir * AMP * edge * g;
            }
            p.v += (t - p.o) * 0.12;
            p.v *= 0.68;
            p.o += p.v;
          }
          let started = false;
          ctx.beginPath();
          for (const p of ln.pts) {
            if (p.y > gb) break;
            const px = ln.x + p.o, py = p.y;
            let blocked = false;
            for (const r of rects) { if (px >= r.x0 && px <= r.x1 && py >= r.y0 && py <= r.y1) { blocked = true; break; } }
            if (blocked) { if (started) { ctx.stroke(); ctx.beginPath(); started = false; } continue; }
            if (!started) { ctx.moveTo(px, py); started = true; } else ctx.lineTo(px, py);
          }
          if (started) ctx.stroke();
        }
      };
    }

    // ---------- sticky header: name pinned; info row folds on scroll-down, expands on scroll-up / near top ----------
    const head = q('[data-ahead]');
    const info = q('[data-ah-info]');
    let infoH = 0, navExp = true, lastY = window.scrollY, lastDir = 'up', headerUpdate = null;
    if (head && info) {
      const setNav = (exp) => {
        if (exp === navExp) return;
        navExp = exp;
        info.style.opacity = exp ? '1' : '0';
        info.style.transform = exp ? 'translateY(0)' : 'translateY(-10px)';
        info.style.maxHeight = exp ? infoH + 'px' : '0px';
        info.style.paddingTop = exp ? '16px' : '0px';
        info.style.paddingBottom = exp ? '14px' : '0px';
        info.style.pointerEvents = exp ? 'auto' : 'none';
      };
      requestAnimationFrame(() => {
        infoH = info.scrollHeight;
        info.style.overflow = 'hidden';
        info.style.boxSizing = 'border-box';
        info.style.maxHeight = infoH + 'px';
        info.style.transition = 'opacity 0.45s ease, transform 0.55s cubic-bezier(0.19,1,0.22,1), max-height 0.55s cubic-bezier(0.19,1,0.22,1), padding 0.55s cubic-bezier(0.19,1,0.22,1)';
      });
      let solid = false;
      const paintHead = () => {
        const dark = !!(this._ab && this._ab.dark);
        if (solid) {
          head.style.background = dark ? '#111214' : '#ffffff';
          head.style.setProperty('--htext', dark ? '#ecebe8' : '#111214');
          head.style.setProperty('--hrule', dark ? 'rgba(199,194,206,0.22)' : 'rgba(17,18,20,0.14)');
        } else {
          head.style.background = 'rgba(17,18,20,0)';
          head.style.setProperty('--htext', '#ecebe8');
          head.style.setProperty('--hrule', 'rgba(199,194,206,0.22)');
        }
      };
      this._paintHead = paintHead;
      headerUpdate = () => {
        const y = window.scrollY;
        const heroH = sec ? sec.offsetHeight : window.innerHeight * 0.52;
        if (y < lastY - 1) lastDir = 'up'; else if (y > lastY + 1) lastDir = 'down';
        lastY = y;
        setNav(y < heroH * 0.5 || lastDir === 'up');
        const wantSolid = sec ? (sec.getBoundingClientRect().bottom <= head.offsetHeight + 10) : (y > heroH);
        if (wantSolid !== solid) { solid = wantSolid; paintHead(); }
      };
    }

    // ---------- scroll reveals ----------
    const reveals = qa('[data-reveal]');
    reveals.forEach(el => { el.style.opacity = '0'; el.style.transform = 'translateY(28px)'; el.style.transition = 'opacity 0.9s ease, transform 0.9s cubic-bezier(0.19,1,0.22,1)'; });
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.style.opacity = '1'; e.target.style.transform = 'translateY(0)'; io.unobserve(e.target); } });
    }, { threshold: 0.15 });
    reveals.forEach(el => io.observe(el));
    this._cleanups.push(() => io.disconnect());

    // ---------- signature pixel trail: v1-glitch-shaped cells of blurry-pixelated image follow the cursor ----------
    if (fine) qa('[data-pixtrail]').forEach((wrap) => {
      const media = wrap.querySelector('video, img');
      if (!media) return;
      const cv2 = doc.createElement('canvas');
      cv2.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:2;image-rendering:pixelated;';
      wrap.appendChild(cv2);
      const ctx = cv2.getContext('2d');
      const tiny = doc.createElement('canvas'); const tctx = tiny.getContext('2d');
      const G = 34, PX = 22;
      let blocks = [], raf = null, lx = -1e3, ly = -1e3;
      const draw = () => {
        const w = wrap.clientWidth, h = wrap.clientHeight;
        if (!w || !h) { raf = requestAnimationFrame(draw); return; }
        if (cv2.width !== w) { cv2.width = w; cv2.height = h; }
        const now = performance.now();
        blocks = blocks.filter(b => now - b.t < b.ttl);
        ctx.clearRect(0, 0, w, h);
        const mw = media.videoWidth || media.naturalWidth, mh = media.videoHeight || media.naturalHeight;
        if (blocks.length && mw && mh) {
          tiny.width = Math.max(2, Math.round(w / PX)); tiny.height = Math.max(2, Math.round(h / PX));
          const s = Math.max(tiny.width / mw, tiny.height / mh);
          tctx.imageSmoothingEnabled = true;
          try { tctx.drawImage(media, (tiny.width - mw * s) / 2, (tiny.height - mh * s) / 2, mw * s, mh * s); } catch (e) {}
          ctx.imageSmoothingEnabled = false;
          for (const b of blocks) {
            const age = (now - b.t) / b.ttl;
            ctx.globalAlpha = age < 0.18 ? age / 0.18 : 1 - (age - 0.18) / 0.82;
            ctx.drawImage(tiny, b.x / w * tiny.width, b.y / h * tiny.height, Math.max(1, b.w / w * tiny.width), Math.max(1, b.h / h * tiny.height), b.x, b.y, b.w, b.h);
          }
          ctx.globalAlpha = 1;
        }
        if (blocks.length) raf = requestAnimationFrame(draw);
        else { raf = null; ctx.clearRect(0, 0, cv2.width, cv2.height); }
      };
      const move = (e) => {
        const r = wrap.getBoundingClientRect();
        const x = e.clientX - r.left, y = e.clientY - r.top;
        if (Math.hypot(x - lx, y - ly) < G * 0.55) return;
        lx = x; ly = y;
        for (let i = 0; i < 8; i++) {
          blocks.push({
            x: Math.floor((x + (Math.random() * 7 - 3.5) * G) / G) * G,
            y: Math.floor((y + (Math.random() * 5 - 2.5) * G) / G) * G,
            w: G * (1 + (Math.random() * 3 | 0)), h: G * (1 + (Math.random() * 2 | 0)),
            t: performance.now(), ttl: 360 + Math.random() * 420
          });
        }
        if (blocks.length > 90) blocks = blocks.slice(-90);
        if (!raf) raf = requestAnimationFrame(draw);
      };
      const leave = () => { lx = -1e3; ly = -1e3; };
      wrap.addEventListener('mousemove', move);
      wrap.addEventListener('mouseleave', leave);
      this._cleanups.push(() => { wrap.removeEventListener('mousemove', move); wrap.removeEventListener('mouseleave', leave); if (raf) cancelAnimationFrame(raf); });
    });

    // ---------- Lenis smooth scroll (stepped from the master loop) ----------
    this._lenis = null;
    const initLenis = () => {
      if (this._lenis) return true;
      if (!window.Lenis) return false;
      this._lenis = new window.Lenis({ lerp: 0.09, smoothWheel: true, wheelMultiplier: 1 });
      return true;
    };
    if (!initLenis()) {
      let tries = 0;
      const poll = setInterval(() => { if (initLenis() || ++tries > 60) clearInterval(poll); }, 120);
      this._cleanups.push(() => clearInterval(poll));
    }
    this._cleanups.push(() => { if (this._lenis) { this._lenis.destroy(); this._lenis = null; } });

    // ---------- master frame loop ----------
    const onFrame = (t) => {
      if (this._lenis) this._lenis.raf(t);
      if (headerUpdate) headerUpdate();
      if (gridUpdate) { const r = cv.getBoundingClientRect(); if (r.bottom > 0 && r.top < window.innerHeight) gridUpdate(); }
      this._raf = requestAnimationFrame(onFrame);
    };
    this._raf = requestAnimationFrame(onFrame);
    this._cleanups.push(() => cancelAnimationFrame(this._raf));
  }
  componentWillUnmount() { (this._cleanups || []).forEach(fn => { try { fn(); } catch (e) {} }); }
}
</script>
</body>
</html>
